burgr-model-version: 1.0.0

services:
  # ---- #
  authentication:
    api_description:
      is_anonymous: true
    methods:
      login:
        inputs:
          request: login_request
      
      set_initial_password:
        inputs:
          email:
          password:
      
      need_initial_password:
        result: bool
        inputs:
          email:
    dependencies:
      user:
      local_user:

  # ---- #
  invites:
    api_description:
      is_anonymous: true
    methods:
      check_invite:
        result: invite_result
        inputs:
          invite_id: guid
      use_invite:
        inputs:
          invite_id: guid
          password:
    dependencies:
      invite:

  # ---- #
  self_user_creation:
    api_description:
      is_anonymous: true
    methods:
      create_user:
        result: identity
        inputs:
          request: self_user_creation_request
    dependencies:
      user:
      local_user:

  # ---- #
  server_status:
    api_description:
      is_anonymous: true
    methods:
      need_tech_user_password_update:
        result: bool
        inputs:
          tech_user:
    dependencies:
      local_user:
      user:
  
  # ---- #
  token_validation:
    api: true
    methods:
      validate:
        result: string

  # ---- #
  user_creation:
    api: true
    methods:
      create_user:
        result: identity
        inputs:
          user_creation_info: user_creation_info
        api_description:
          mandatory_right: CreateUser
    dependencies:
      local_user:
      user:

transients:
  # ---- #
  invite_result:
    properties:
      email:
      creator:
      message:

  # ---- #
  login_request:
    properties:
      login:
      password:

  # ---- #
  self_user_creation_request:
    properties:
      email:
      password:
      
  # ---- #
  user_creation_info:
    properties:
      user_email:
      password:
      rights: user_right[]